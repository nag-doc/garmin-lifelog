name: Garmin Sync Daily

on:
  schedule:
    # JST 23:55 (UTC 14:55) に毎日実行
    - cron: '55 14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install garminconnect gspread google-auth

    - name: Run sync script (Yesterday & Today)
      env:
        GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
        SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        python fetch_daily.py
